<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#ba0018"/>

  <!-- Ноги штатива -->
  <path
    d="M11.5 21.5 L7.5 29 M20.5 21.5 L24.5 29 M16 21.5 L16 29"
    stroke="#fff"
    stroke-width="2.25"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Головка штатива -->
  <rect x="9.5" y="19.2" width="13" height="2.8" rx="0.6" fill="#fff"/>

  <!-- Круглая база нивелира -->
  <ellipse cx="16" cy="17.2" rx="7.2" ry="2.1" fill="#fff"/>
  <ellipse
    cx="16"
    cy="17"
    rx="5.6"
    ry="1.35"
    stroke="#1a1a1a"
    stroke-width="0.7"
    fill="none"
    opacity="0.35"
  />

  <!-- Корпус-труба -->
  <rect x="8.5" y="9.8" width="15" height="5.8" rx="2.9" fill="#fff"/>

  <!-- Объектив (слева, крупнее) -->
  <rect x="4.2" y="10.1" width="5.2" height="5.2" rx="2.6" fill="#1a1a1a"/>
  <circle cx="6.2" cy="12.7" r="1.35" fill="#ba0018" opacity="0.55"/>

  <!-- Окуляр (справа) -->
  <rect x="23.2" y="10.6" width="4.2" height="4.2" rx="2.1" fill="#1a1a1a"/>
  <circle cx="25.3" cy="12.7" r="0.85" fill="#ba0018" opacity="0.45"/>

  <!-- Микровинты / фокус -->
  <circle cx="12.8" cy="8.6" r="1.05" fill="#1a1a1a"/>
  <rect x="15.8" y="8.1" width="2.2" height="1.6" rx="0.5" fill="#1a1a1a"/>
</svg>
